<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八字运势推送</title>
<style>
  :root {
    --bg: #faf8f5;
    --card: #ffffff;
    --primary: #c0392b;
    --primary-light: #e74c3c;
    --text: #2c3e50;
    --muted: #7f8c8d;
    --border: #ecf0f1;
    --gold: #d4ac0d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  .container { max-width: 560px; margin: 0 auto; }
  .card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    padding: 28px;
    margin-bottom: 20px;
  }
  .header {
    text-align: center;
    padding: 32px 20px 20px;
    background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%);
    border-radius: 16px;
    color: white;
    margin-bottom: 20px;
  }
  .header h1 { font-size: 26px; font-weight: 700; letter-spacing: 2px; }
  .header p { font-size: 14px; opacity: .85; margin-top: 6px; }
  h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: var(--primary); }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 14px; color: var(--muted); margin-bottom: 6px; }
  input[type=text], input[type=time], input[type=url], select {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 15px;
    outline: none; transition: border .2s;
    background: #fafafa;
    font-family: inherit;
  }
  input:focus, select:focus { border-color: var(--primary); background: #fff; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  button {
    background: var(--primary); color: #fff;
    border: none; border-radius: 10px;
    padding: 11px 20px; font-size: 15px;
    font-weight: 600; cursor: pointer;
    transition: background .2s; width: 100%;
  }
  button:hover { background: var(--primary-light); }
  button.secondary { background: #ecf0f1; color: var(--text); }
  button.secondary:hover { background: #dfe6e9; }
  button.test { background: #27ae60; }
  button.test:hover { background: #2ecc71; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .status {
    padding: 12px 16px; border-radius: 10px;
    font-size: 14px; margin-top: 12px;
    display: none;
  }
  .status.ok { display: block; background: #d5f5e3; color: #1e8449; border: 1px solid #a9dfbf; }
  .status.err { display: block; background: #fadbd8; color: #c0392b; border: 1px solid #f5b7b1; }
  .info-list { font-size: 14px; line-height: 2; }
  .info-list span { color: var(--muted); }
  .bazi-card {
    background: linear-gradient(135deg, #2c3e50, #34495e);
    color: #ecf0f1;
    border-radius: 12px;
    padding: 16px;
    margin-top: 12px;
    font-size: 14px;
  }
  .pillar-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
  }
  .pillar {
    text-align: center;
    min-width: 0;
  }
  .pillar .label {
    display: block;
    font-size: 11px;
    color: #95a5a6;
    margin-bottom: 4px;
  }
  .pillar .gz {
    display: block;
    font-size: 16px;
    font-weight: 700;
    color: #f1c40f;
    letter-spacing: 1px;
  }
  .pillar .nayin {
    display: block;
    font-size: 12px;
    color: #cbd5e1;
    margin-top: 4px;
    white-space: nowrap;
  }
  .bazi-card .map { font-size: 12px; color: #95a5a6; margin-top: 10px; line-height: 1.6; }
  .fortune-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 13px;
  }
  .fortune-table th, .fortune-table td {
    border-bottom: 1px solid var(--border);
    padding: 8px 6px;
    text-align: left;
    vertical-align: top;
  }
  .fortune-table th { color: var(--muted); font-weight: 600; }
  .fortune-table td:last-child, .fortune-table th:last-child { text-align: right; }
  .section { display: none; }
  .section.active { display: block; }
  .nav { display: flex; gap: 8px; margin-bottom: 16px; }
  .nav button {
    flex: 1; border-radius: 8px; font-size: 14px;
    background: var(--border); color: var(--text);
  }
  .nav button.active { background: var(--primary); color: #fff; }
  .tip { font-size: 12px; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>运势推送</h1>
    <p>基于八字的每日运势提醒 · 定时推送到钉钉</p>
  </div>

  <div class="nav">
    <button class="active" onclick="switchTab('config', this)">配置</button>
    <button onclick="switchTab('info', this)">说明</button>
  </div>

  <div id="config" class="section active">
    <div class="card">
      <h2>基本信息</h2>
      <div class="row">
        <div class="form-group">
          <label>姓名</label>
          <input type="text" id="userName" placeholder="输入姓名">
        </div>
        <div class="form-group">
          <label>性别</label>
          <select id="gender">
            <option value="male">男</option>
            <option value="female">女</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="form-group">
          <label>出生日期（农历）</label>
          <input type="text" id="birthDate" placeholder="YYYY-MM-DD" value="2004-01-23">
          <div class="tip">请填写农历日期</div>
        </div>
        <div class="form-group">
          <label>出生时辰</label>
          <input type="time" id="birthTime" value="06:30">
        </div>
      </div>
      <div class="form-group">
        <label>出生地点</label>
        <input type="text" id="location" placeholder="城市，如：福建泉州" value="福建泉州">
      </div>
      <div id="baziDisplay" class="bazi-card" style="display:none">
        <div style="font-size:12px;color:#95a5a6;margin-bottom:8px">您的八字</div>
        <div class="pillar-grid" id="baziPillars"></div>
        <div class="map">上为四柱，下为对应纳音：年柱、月柱、日柱、时柱一一对应。</div>
      </div>
    </div>

    <div class="card">
      <h2>钉钉机器人</h2>
      <div class="form-group">
        <label>钉钉 Webhook 地址</label>
        <input type="url" id="webhook" placeholder="https://oapi.dingtalk.com/robot/send?access_token=...">
      </div>
      <div class="form-group">
        <label>推送时间</label>
        <input type="time" id="pushTime" value="06:30">
      </div>
      <button onclick="testDingtalk()" class="test">测试钉钉连接</button>
      <button onclick="saveConfig()" style="margin-top:12px">保存配置</button>
      <div id="saveStatus" class="status"></div>
    </div>

    <div class="card">
      <h2>立即推送</h2>
      <button onclick="pushNow()">立刻发送运势到钉钉</button>
      <div id="pushStatus" class="status"></div>
    </div>
  </div>

  <div id="info" class="section">
    <div class="card">
      <h2>使用说明</h2>
      <div class="info-list">
        <div>① <b>基本信息</b>：填写您的农历出生日期和时间</div>
        <div>② <b>钉钉配置</b>：粘贴钉钉机器人的 Webhook 地址</div>
        <div>③ <b>推送时间</b>：设置每天几点推送运势</div>
        <div>④ <b>保存</b>：点击保存配置按钮</div>
        <div>⑤ <b>测试</b>：先测试钉钉连接，再手动推送</div>
      </div>
      <br>
      <div style="font-size:13px;color:var(--muted)">
        运势基于农历日期换算八字排盘，每日自动生成运势内容。<br>
        运势内容仅供参考，请理性看待。
      </div>
    </div>
    <div class="card">
      <h2>部署说明</h2>
      <div class="info-list">
        <div>推荐部署到 <b>Railway</b> 或 <b>Render</b></div>
        <div>免费额度足够个人使用</div>
        <div>部署后每天自动推送，无需电脑开机</div>
      </div>
    </div>
  </div>

</div>

<script>
function switchTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

async function testDingtalk() {
  const status = document.getElementById('saveStatus');
  status.className = 'status'; status.textContent = '发送中...'; status.classList.add('ok'); status.style.display = 'block';
  try {
    const r = await fetch('/api/test-dingtalk');
    const d = await r.json();
    status.className = 'status ' + (d.ok ? 'ok' : 'err');
    status.textContent = d.msg;
  } catch(e) {
    status.className = 'status err'; status.textContent = '请求失败: ' + e.message;
  }
}

async function saveConfig() {
  const status = document.getElementById('saveStatus');
  const data = {
    webhook: document.getElementById('webhook').value,
    pushTime: document.getElementById('pushTime').value,
    userName: document.getElementById('userName').value,
    birthDate: document.getElementById('birthDate').value,
    birthTime: document.getElementById('birthTime').value,
    gender: document.getElementById('gender').value,
    location: document.getElementById('location').value
  };
  if (!data.webhook) { alert('请填写 Webhook 地址'); return; }
  if (!data.birthDate) { alert('请填写出生日期'); return; }
  status.className = 'status'; status.textContent = '保存中...'; status.style.display = 'block';
  try {
    const r = await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
    const d = await r.json();
    status.className = 'status ' + (d.ok ? 'ok' : 'err');
    status.textContent = d.ok ? '保存成功！' : d.msg;
    if (d.ok) await loadConfig();
  } catch(e) {
    status.className = 'status err'; status.textContent = '请求失败: ' + e.message;
  }
}

async function pushNow() {
  const status = document.getElementById('pushStatus');
  status.className = 'status'; status.textContent = '发送中...'; status.style.display = 'block';
  try {
    const r = await fetch('/api/push', { method: 'POST' });
    const d = await r.json();
    status.className = 'status ' + (d.ok ? 'ok' : 'err');
    status.textContent = d.ok ? '发送成功！' : d.msg;
  } catch(e) {
    status.className = 'status err'; status.textContent = '请求失败: ' + e.message;
  }
}

async function loadConfig() {
  try {
    const r = await fetch('/api/config');
    const d = await r.json();
    const webhookInput = document.getElementById('webhook');
    if (d.webhook && !d.webhook.includes('***')) {
      webhookInput.value = d.webhook;
    } else if (d.webhookConfigured) {
      webhookInput.value = '';
      webhookInput.placeholder = '已通过 Railway 环境变量配置，如需修改请粘贴完整 Webhook';
    }
    if (d.pushTime) document.getElementById('pushTime').value = d.pushTime;
    if (d.userName) document.getElementById('userName').value = d.userName;
    if (d.birthDate) document.getElementById('birthDate').value = d.birthDate;
    if (d.birthTime) document.getElementById('birthTime').value = d.birthTime;
    if (d.gender) document.getElementById('gender').value = d.gender;
    if (d.location) document.getElementById('location').value = d.location;
      if (d.bazi) {
      const b = d.bazi;
      document.getElementById('baziDisplay').style.display = 'block';
      const pillars = [
        ['年柱', b.yearGZ, b.yearNaYin],
        ['月柱', b.monthGZ, b.monthNaYin],
        ['日柱', b.dayGZ, b.dayNaYin],
        ['时柱', b.timeGZ, b.timeNaYin]
      ];
      document.getElementById('baziPillars').innerHTML = pillars.map(([label, gz, nayin]) =>
        '<div class="pillar"><span class="label">' + label + '</span><span class="gz">' + (gz || '-') + '</span><span class="nayin">' + (nayin || '-') + '</span></div>'
      ).join('');
    }
  } catch(e) { console.error(e); }
}

loadConfig();
</script>
</body>
</html>
